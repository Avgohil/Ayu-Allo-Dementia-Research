<svg viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#4a6fa5"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="#ffffff"/>
  <rect x="0" y="0" width="6" height="320" fill="url(#edge)"/>

  <!-- minimal line-art node graph, right side, representing a research network (not a brain illustration) -->
  <g stroke="#c7d2e0" stroke-width="1.4" fill="none">
    <line x1="950" y1="80" x2="1050" y2="60"/>
    <line x1="950" y1="80" x2="1020" y2="140"/>
    <line x1="1050" y1="60" x2="1140" y2="90"/>
    <line x1="1020" y1="140" x2="1140" y2="90"/>
    <line x1="1020" y1="140" x2="1080" y2="210"/>
    <line x1="1140" y1="90" x2="1200" y2="150"/>
    <line x1="1080" y1="210" x2="1200" y2="150"/>
    <line x1="1080" y1="210" x2="1160" y2="250"/>
  </g>
  <g fill="#4a6fa5">
    <circle cx="950" cy="80" r="4"/>
    <circle cx="1050" cy="60" r="4"/>
    <circle cx="1020" cy="140" r="5"/>
    <circle cx="1140" cy="90" r="4"/>
    <circle cx="1200" cy="150" r="4"/>
    <circle cx="1080" cy="210" r="5"/>
    <circle cx="1160" cy="250" r="4"/>
  </g>

  <!-- text block -->
  <text x="60" y="110" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="600" fill="#16233d">Ayu-Allo Dementia Research</text>

  <text x="60" y="150" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#48536b">
    Research companion repository — scientific foundation for early Alzheimer's risk detection
  </text>

  <line x1="60" y1="180" x2="560" y2="180" stroke="#c7d2e0" stroke-width="1.5"/>

  <text x="60" y="215" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#6b7690">
    Alzheimer's Association International Conference (AAIC) 2026 — Virtual Poster
  </text>
  <text x="60" y="245" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#6b7690">
    Ayurvedic phenotyping · Locus Coeruleus biology · explainable clinical AI
  </text>

  <text x="60" y="290" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#9aa4ba">
    Implementation: github.com/Avgohil/fusion-care-alzheimer-ml
  </text>
</svg>
